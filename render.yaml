services:
  - type: web
    name: gymbakend-1
    env: python
    region: oregon
    branch: master
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn discipl_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: discipl_backend.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: myproject-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: gymbakend-1.onrender.com,localhost
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.3"
